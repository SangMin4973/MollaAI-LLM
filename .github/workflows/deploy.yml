name: Deploy to Spot Instance (Docker Hub)

on:
  push:
    branches: [ "main" ]

env:
  DOCKERHUB_REPO: goodspace/molla-llm
  ASG_NAME: molla-llm
  CONTAINER_NAME: molla-llm
  QDRANT_CONTAINER_NAME: molla-qdrant
  REMOTE_APP_DIR: /opt/molla-llm

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 1. 도커 허브 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. 도커 이미지 빌드 및 푸시
    - name: Build and push
      working-directory: ./molla-llm
      run: |
        docker build -t ${{ env.DOCKERHUB_REPO }}:latest .
        docker push ${{ env.DOCKERHUB_REPO }}:latest

    # 3. AWS 인증 (IP 추출용)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    # 4. 실시간 IP 리스트 가져오기
    - name: Get Instance IPs
      id: get-ips
      run: |
        IPs=$(aws ec2 describe-instances \
          --filters "Name=tag:aws:autoscaling:groupName,Values=${{ env.ASG_NAME }}" \
                    "Name=instance-state-name,Values=running" \
          --query "Reservations[].Instances[].PublicIpAddress" \
          --output text)
        echo "ips=$IPs" >> $GITHUB_OUTPUT

    # 5. 각 서버에 compose 파일 업로드
    - name: Upload compose file
      run: |
        printf "%s" "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
        chmod 600 private_key.pem

        for IP in ${{ steps.get-ips.outputs.ips }}; do
          echo "📦 Uploading compose file to $IP..."
          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@$IP "mkdir -p ${{ env.REMOTE_APP_DIR }}"
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ github.workspace }}/molla-llm/docker-compose.yml \
            ubuntu@$IP:${{ env.REMOTE_APP_DIR }}/docker-compose.yml
        done

    # 6. 각 서버에 접속해서 compose 배포
    - name: Deploy
      run: |
        printf "%s" "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
        chmod 600 private_key.pem
        
        for IP in ${{ steps.get-ips.outputs.ips }}; do
          echo "🚀 Deploying to $IP..."
          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@$IP "
            mkdir -p ${{ env.REMOTE_APP_DIR }} && \
            cd ${{ env.REMOTE_APP_DIR }} && \
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }} && \
            docker stop ${{ env.CONTAINER_NAME }} || true && \
            docker rm ${{ env.CONTAINER_NAME }} || true && \
            docker stop ${{ env.QDRANT_CONTAINER_NAME }} || true && \
            docker rm ${{ env.QDRANT_CONTAINER_NAME }} || true && \
            docker compose down --remove-orphans || true && \
            docker pull ${{ env.DOCKERHUB_REPO }}:latest && \
            docker compose up -d
          "
        done
