services:
  molla-llm:
    image: goodspace/molla-llm:latest
    container_name: molla-llm
    restart: unless-stopped
    gpus: all
    ports:
      - "8001:8001"
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started

  qdrant:ㅎ
    image: qdrant/qdrant:latest
    container_name: molla-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
